<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#e94560" />
    <title>BondChess</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <section id="menuScreen" class="card menu-screen">
        <h1>♟️ BondChess</h1>
        <p class="subtitle">Онлайн шахматы для двоих</p>

        <label class="field">
          <span>Сложность подсказок</span>
          <select id="difficultySelect">
            <option value="easy">Лёгкий (сразу)</option>
            <option value="normal">Нормальный (через 10 сек)</option>
            <option value="hard">Сложный (без подсказок)</option>
          </select>
        </label>

        <button id="createRoomBtn" class="primary">Создать игру</button>

        <div class="join-group">
          <label class="field">
            <span>Код комнаты</span>
            <input id="roomCodeInput" maxlength="6" placeholder="ABC123" />
          </label>
          <button id="joinRoomBtn">Войти</button>
        </div>

        <div class="quick-help">
          <p>Как играть:</p>
          <ol>
            <li>Нажмите «Создать игру» — получите код комнаты</li>
            <li>Отправьте код другу (кнопка 📋 скопирует его)</li>
            <li>Друг вводит код в поле «Код комнаты» и жмёт «Войти»</li>
          </ol>
        </div>

        <button id="copyLinkBtn" class="ghost hidden">📋 Скопировать ссылку</button>
      </section>

      <section id="gameScreen" class="hidden game-screen">
        <header class="top-bar">
          <div class="player-slot white-slot">
            <span class="player-dot white"></span>
            <span id="whitePlayerName">Белые</span>
          </div>
          <div class="status-slot" id="turnLabel">Ход белых</div>
          <div class="player-slot black-slot">
            <span id="blackPlayerName">Чёрные</span>
            <span class="player-dot black"></span>
          </div>
        </header>

        <main class="board-wrap">
          <div id="board" class="board"></div>
        </main>

        <footer class="bottom-bar">
          <button id="openChatBtn" class="bottom-btn chat-btn">💬<span>Чат</span></button>
          <button id="openHistoryBtn" class="bottom-btn">📜<span>История</span></button>
          <button id="resignBtn" class="bottom-btn">🏳️<span>Сдаться</span></button>
          <button id="leaveBtn" class="bottom-btn">🚪<span>Выход</span></button>
        </footer>

        <div id="chatModal" class="overlay-modal hidden">
          <div class="overlay-backdrop" data-close-modal="chat"></div>
          <div class="overlay-panel">
            <div class="overlay-header">
              <h3>Чат</h3>
              <button class="overlay-close" data-close-modal="chat" aria-label="Закрыть">×</button>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <form id="chatForm" class="chat-form">
              <input id="chatInput" maxlength="200" autocomplete="off" enterkeyhint="send" />
              <button type="submit">Отправить</button>
            </form>
          </div>
        </div>

        <div id="historyModal" class="overlay-modal hidden">
          <div class="overlay-backdrop" data-close-modal="history"></div>
          <div class="overlay-panel">
            <div class="overlay-header">
              <h3>История ходов</h3>
              <button class="overlay-close" data-close-modal="history" aria-label="Закрыть">×</button>
            </div>
            <ol id="historyList" class="history-list"></ol>
          </div>
        </div>

        <div class="game-credits">Made with ❤️ by DenBOND</div>
        <div id="roomCodeLabel" class="hidden"></div>
        <div id="myColorLabel" class="hidden"></div>
        <div id="opponentStatus" class="hidden"></div>
        <div id="difficultyLabel" class="hidden"></div>
      </section>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div id="modal" class="modal hidden">
      <div class="modal-body card">
        <h3 id="modalTitle"></h3>
        <p id="modalText"></p>
        <div id="modalActions" class="modal-actions"></div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#e94560" />
    <title>BondChess</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <section id="menuScreen" class="card menu-screen">
        <h1>♟️ BondChess</h1>
        <p class="subtitle">Онлайн шахматы для двоих</p>

        <label class="field">
          <span>Сложность подсказок</span>
          <select id="difficultySelect">
            <option value="easy">Лёгкий (сразу)</option>
            <option value="normal">Нормальный (через 30 сек)</option>
            <option value="hard">Сложный (без подсказок)</option>
          </select>
        </label>

        <button id="createRoomBtn" class="primary">Создать игру</button>

        <div class="join-group">
          <label class="field">
            <span>Код комнаты</span>
            <input id="roomCodeInput" maxlength="6" placeholder="ABC123" />
          </label>
          <button id="joinRoomBtn">Войти</button>
        </div>

        <div class="quick-help">
          <p>Как играть:</p>
          <ol>
            <li>Нажмите «Создать игру» — получите код комнаты</li>
            <li>Отправьте код другу (кнопка 📋 скопирует его)</li>
            <li>Друг вводит код в поле «Код комнаты» и жмёт «Войти»</li>
          </ol>
        </div>

        <button id="copyLinkBtn" class="ghost hidden">📋 Скопировать ссылку</button>
      </section>

      <section id="gameScreen" class="hidden game-screen">
        <aside class="panel-left">
            <div class="top-info room-info">
              <div class="room-code-row">
                <span>#<b id="roomCodeLabel">------</b></span>
                <button id="copyRoomCodeInlineBtn" class="copy-inline" aria-label="Скопировать код">📋</button>
              </div>
              <div>Ты: <b id="myColorLabel">-</b></div>
              <div>Ход: <b id="turnLabel">-</b></div>
              <div class="room-opponent">Соперник: <b id="opponentStatus">ожидание</b></div>
              <div class="room-mode">Режим: <b id="difficultyLabel">-</b></div>
            </div>
            <button id="copyRoomCodeBtn" class="btn-copy" aria-label="Скопировать код">📋</button>
            <div class="timers">
              <div class="timer opponent" id="blackTimer">10:00</div>
              <div class="timer self active" id="whiteTimer">10:00</div>
            </div>
            <div class="signature footer-credits">Made with ❤️ by DenBOND</div>
          </aside>

          <main class="board-wrap">
            <div id="board" class="board"></div>
          </main>

          <aside class="panel-right">
            <div class="tabs">
              <button class="tab tab-btn active" data-tab="history">📜 История</button>
              <button class="tab tab-btn tab-chat" data-tab="chat">💬 Чат</button>
              <button class="tab tab-btn" data-tab="controls">⚙️ Управление</button>
            </div>

            <div id="historyTab" class="tab-content active">
              <button class="tab-close" type="button" aria-label="Закрыть вкладку">✕</button>
              <ol id="historyList"></ol>
            </div>

            <div id="chatTab" class="tab-content">
              <button class="tab-close" type="button" aria-label="Закрыть вкладку">✕</button>
              <div id="chatMessages" class="chat-messages"></div>
              <form id="chatForm" class="chat-form">
                <input id="chatInput" maxlength="200" autocomplete="off" enterkeyhint="send" />
                <button type="submit">Отправить</button>
              </form>
            </div>

            <div id="controlsTab" class="tab-content actions">
              <button class="tab-close" type="button" aria-label="Закрыть вкладку">✕</button>
              <button id="resignBtn" class="btn btn-danger">Сдаться</button>
              <button id="offerDrawBtn" class="btn">Предложить ничью</button>
              <button id="newGameBtn" class="btn">Новая игра</button>
              <button id="leaveBtn" class="btn btn-ghost">Выйти в меню</button>
            </div>
          </aside>
        
      </section>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div id="modal" class="modal hidden">
      <div class="modal-body card">
        <h3 id="modalTitle"></h3>
        <p id="modalText"></p>
        <div id="modalActions" class="modal-actions"></div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
